```yaml
# =========================================================
# Theme Settings
# =========================================================

minimal_mistakes_skin: "sunrise"
# Available skins:
# air, contrast, aqua, mint, dark, dirt, neon, plum, sunrise


# =========================================================
# Site Settings
# =========================================================

locale: "en-US"

title: "Meng Gao (高萌)"
title_separator: "-"
name: &name "Meng Gao (高萌)"

description: &description >-
  Associate Professor at the China School of Banking and Finance,
  University of International Business and Economics.
  Research fields: Corporate Governance, Corporate Finance,
  Behavioral Finance, and ESG.

url: "https://menggaosite.github.io"
baseurl: ""
repository: "menggaosite/menggaosite.github.io"

teaser:
logo:

breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false


# =========================================================
# Comments
# =========================================================

comments:
  provider:
  disqus:
    shortname:
  discourse:
    server:
  facebook:
    appid:
    num_posts: 100
    colorscheme:


# Staticman is currently disabled because no comment provider
# is selected. The branch is kept consistent with this repository.

staticman:
  allowedFields:
    - name
    - email
    - url
    - message
  branch: "main"
  commitMessage: "New comment."
  filename: "comment-{@timestamp}"
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields:
    - name
    - email
    - message
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"


# =========================================================
# Feed
# =========================================================

atom_feed:
  path:


# =========================================================
# SEO
# =========================================================

google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:


# =========================================================
# Social Sharing
# =========================================================

twitter:
  username: &twitter

facebook:
  username:
  app_id:
  publisher:

og_image:

social:
  type: "Person"
  name: "Meng Gao"
  links:
    - "https://menggaosite.github.io"
    - "https://sbf.uibe.edu.cn/szdw/xyjs/fjszc/58be8eccef0e4b318497c8ac70a783c8.htm"


# =========================================================
# Analytics
# =========================================================

analytics:
  provider:
  google:
    tracking_id:


# =========================================================
# Site Author
# =========================================================

author:
  name: "Meng Gao (高萌)"

  # The template automatically looks for this file in /images/
  avatar: "profile.png"

  bio: >-
    Associate Professor, China School of Banking and Finance,
    University of International Business and Economics

  location: "Beijing, China"

  location_url: >-
    https://www.google.com/maps/search/?api=1&query=University+of+International+Business+and+Economics%2C+No.+10+Huixin+Dongjie%2C+Chaoyang+District%2C+Beijing+100029%2C+China

  employer: "University of International Business and Economics"

  email: "meng.gao@uibe.edu.cn"

  uri: "https://menggaosite.github.io"
  github: "menggaosite"

  googlescholar:
  pubmed:
  researchgate:
  google_plus:
  impactstory:
  linkedin:
  orcid:
  stackoverflow:
  twitter:
  youtube:
  wikipedia:


# =========================================================
# Contact Information
# =========================================================

contact:
  email_primary: "meng.gao@uibe.edu.cn"
  email_secondary:

  address: >-
    China School of Banking and Finance,
    University of International Business and Economics,
    No. 10 Huixin Dongjie,
    Chaoyang District,
    Beijing 100029,
    P.R. China


# =========================================================
# Reading Files
# =========================================================

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - CHANGELOG.md
  - Capfile
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - LICENSE
  - LICENSE.md
  - README
  - README.md
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - markdown_generator
  - node_modules
  - package.json
  - talkmap.ipynb
  - talkmap.py
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# =========================================================
# Markdown Conversion
# =========================================================

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: "lsquo,rsquo,ldquo,rdquo"
  enable_coderay: false


# =========================================================
# Collections
# These names match the existing folders in the repository.
# =========================================================

collections:
  publications:
    output: true
    permalink: /publication/:path/

  talks:
    output: true
    permalink: /talks/:path/

  teaching:
    output: true
    permalink: /teaching/:path/

  portfolio:
    output: true
    permalink: /portfolio/:path/

  projects:
    output: true
    permalink: /projects/:path/

  others:
    output: true
    permalink: /others/:path/


# =========================================================
# Default Page Settings
# =========================================================

defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # Publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

  # Talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

  # Teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true

  # Portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true

  # Projects
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true

  # Other materials
  - scope:
      path: ""
      type: others
    values:
      layout: single
      author_profile: true


# =========================================================
# Sass / SCSS
# =========================================================

sass:
  sass_dir: _sass
  style: compressed


# =========================================================
# Output
# =========================================================

permalink: /:categories/:title/
timezone: "Asia/Shanghai"


# =========================================================
# Plugins
# =========================================================

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji


# =========================================================
# Archives
# =========================================================

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/


# =========================================================
# HTML Compression
# =========================================================

compress_html:
  clippings: all
  ignore:
    envs: development


# =========================================================
# Theme Toggle
# =========================================================

toggle:
  theme: true
```
